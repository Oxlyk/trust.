<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TRUST. — Drops</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header class="navbar">
    <div class="nav-logo">TRUST.</div>
    <button class="nav-hamburger" aria-label="Open navigation">☰</button>
    <div class="nav-links">
      <a href="shop.html">Shop</a>
      <a href="drops.html">Drops</a>
      <a href="about.html">About</a>
      <a href="#">Journal</a>
    </div>
    <a class="nav-cta btn-primary" href="drops.html">Drop alerts</a>
  </header>

  <main>
    <section class="drops-section">
      <span class="page-label">UPCOMING DROP</span>
      <h1>Drop 002</h1>
      <p>Coming soon. Get notified.</p>

      <div class="countdown">
        <div class="count-col">
          <span class="count-num" id="days">00</span>
          <span class="count-label">DAYS</span>
        </div>
        <span class="count-sep">:</span>
        <div class="count-col">
          <span class="count-num" id="hours">00</span>
          <span class="count-label">HOURS</span>
        </div>
        <span class="count-sep">:</span>
        <div class="count-col">
          <span class="count-num" id="mins">00</span>
          <span class="count-label">MINS</span>
        </div>
        <span class="count-sep">:</span>
        <div class="count-col">
          <span class="count-num" id="secs">00</span>
          <span class="count-label">SECS</span>
        </div>
      </div>

      <div class="drops-email-form">
        <input id="drops-email-input" type="email" placeholder="your@email.com">
        <button id="drops-submit" type="button">Notify me</button>
      </div>

      <p id="drops-confirm"></p>
    </section>
  </main>

  <footer class="footer">
    <div class="nav-logo">TRUST.</div>
    <div class="footer-links">
      <a href="#">Instagram</a>
      <a href="#">TikTok</a>
      <a href="#">Shipping</a>
      <a href="#">Returns</a>
    </div>
    <div class="footer-copy">© 2026 TRUST.</div>
  </footer>

  <script src="js/main.js"></script>
</body>
</html>
